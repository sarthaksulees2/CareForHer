<!DOCTYPE html>
<html>
<head>

<title>Emergency Help</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
min-height:100vh;
font-family:'Segoe UI', sans-serif;

/* NEW MEDICAL STYLE BACKGROUND */

background:linear-gradient(135deg,#2b5876,#4e4376);

display:flex;
align-items:center;
justify-content:center;
}

/* CARD */

.emergency-card{

background:rgba(255,255,255,0.95);

padding:40px;

border-radius:20px;

text-align:center;

max-width:420px;

width:100%;

box-shadow:0 10px 35px rgba(0,0,0,0.3);

}

/* TITLE */

.emergency-card h2{
font-weight:700;
margin-bottom:10px;
}

/* BUTTONS */

.btn{

border-radius:30px;

padding:12px 20px;

font-size:16px;

width:100%;

margin-top:12px;

}

/* DASHBOARD BUTTON */

.back-btn{
margin-top:20px;
}

</style>

</head>

<body>

<div class="emergency-card">

<h2>🚨 Emergency Assistance</h2>

<p>
If you need immediate medical help, choose one of the options below.
</p>

<a href="tel:108" class="btn btn-danger">
📞 Call Ambulance (108)
</a>

<a href="tel:102" class="btn btn-warning">
📞 Health Helpline (102)
</a>

<a href="https://www.google.com/maps/search/hospital+near+me/" 
target="_blank" 
class="btn btn-primary">
📍 Find Nearby Hospital
</a>

<a href="/dashboard" class="btn btn-dark back-btn">
⬅ Back to Dashboard
</a>

</div>

</body>
</html>
