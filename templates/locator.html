<!DOCTYPE html>
<html>
<head>
<title>Find Sanitary Machines</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f8f9fa;
}

#map{
height:500px;
width:100%;
border-radius:15px;
}

</style>

</head>

<body>

<div class="container mt-4">

<h2 class="text-center mb-3">📍 Nearby Sanitary Pad Machines</h2>

<div id="map"></div>

<div class="text-center mt-3">
<a href="/dashboard" class="btn btn-secondary">Back</a>
</div>

</div>

<script>

function initMap(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(position){

const userLocation={
lat:position.coords.latitude,
lng:position.coords.longitude
};

const map=new google.maps.Map(
document.getElementById("map"),
{
zoom:14,
center:userLocation
}
);

new google.maps.Marker({
position:userLocation,
map:map,
title:"You are here"
});

const machines=[

{
lat:userLocation.lat+0.01,
lng:userLocation.lng+0.01,
name:"Health Center"
},

{
lat:userLocation.lat-0.01,
lng:userLocation.lng+0.02,
name:"Government School Machine"
},

{
lat:userLocation.lat+0.015,
lng:userLocation.lng-0.01,
name:"District Hospital"
}

];

machines.forEach(function(m){

new google.maps.Marker({

position:{lat:m.lat,lng:m.lng},

map:map,

title:m.name,

icon:"https://maps.google.com/mapfiles/ms/icons/pink-dot.png"

});

});

},

function(){

alert("Location permission denied. Showing default location.");

loadDefaultMap();

});

}else{

loadDefaultMap();

}

}

function loadDefaultMap(){

const location={lat:18.5204,lng:73.8567};

const map=new google.maps.Map(
document.getElementById("map"),
{
zoom:13,
center:location
}
);

}

</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCMC0pszWBmjbjbsnhIq83AW3vB-39yvTQ&callback=initMap">
</script>

</body> 
</html>
