<!DOCTYPE html>
<html>
<head>

<title>User Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#4A90E2,#6fb1fc);
font-family:'Segoe UI', sans-serif;
}

/* PROFILE CARD */

.profile-card{
width:420px;
background:rgba(255,255,255,0.18);
padding:35px;
border-radius:22px;
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.25);
box-shadow:0 10px 35px rgba(0,0,0,0.25);
color:white;
}

.profile-card label{
color:#edf4ff;
}

.profile-card h3{
color:white;
}

.form-control{
background:rgba(255,255,255,0.92);
color:#2c3e50;
border-radius:12px;
border:1px solid rgba(0,0,0,0.08);
}

.form-control:focus{
box-shadow:0 0 0 0.15rem rgba(74,144,226,0.25);
}

.btn-primary{
background:#4A90E2;
border:none;
font-weight:500;
}

.btn-primary:hover{
background:#357bd8;
}

/* EDIT BUTTON */

.edit-btn{
float:right;
background:#fff;
border:none;
border-radius:50%;
width:36px;
height:36px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
cursor:pointer;
font-size:18px;
}

/* BUTTON STYLE */

.custom-btn{
display:block;
width:100%;
text-align:center;
padding:10px 20px;
border-radius:30px;
text-decoration:none;
font-weight:500;
margin-top:10px;
transition:0.3s;
}

.btn-primary{
background:#4A90E2;
color:white;
border:none;
}

.btn-primary:hover{
background:#357bd8;
}

/* BACK BUTTON */

.back-btn{
background:#6c757d;
color:white;
}

.back-btn:hover{
background:#5a6268;
transform:translateY(-2px);
}

/* LOGOUT BUTTON */

.logout-btn{
background:#dc3545;
color:white;
}

.logout-btn:hover{
background:#c82333;
transform:translateY(-2px);
}

</style>

</head>

<body>

<div class="profile-card">

<h3 class="text-center mb-3">
👤 User Profile
<button type="button" class="edit-btn" onclick="enableEdit()">✏️</button>
</h3>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="alert alert-success text-center">
        {{ messages[0] }}
    </div>
  {% endif %}
{% endwith %}

<form method="POST">

<label>Name</label>
<input class="form-control mb-2 profile-input" name="name" value="{{user.name}}" disabled>

<label>Email</label>
<input class="form-control mb-2 profile-input" name="email" value="{{user.email}}" disabled>

<label>Age</label>
<input class="form-control mb-2 profile-input" name="age" value="{{user.age}}" disabled>

<label>Height (cm)</label>
<input class="form-control mb-2 profile-input" name="height" value="{{user.height}}" disabled>

<label>Weight (kg)</label>
<input class="form-control mb-2 profile-input" name="weight" value="{{user.weight}}" disabled>

<label>Cycle Length</label>
<input class="form-control mb-3 profile-input" name="cycle_length" value="{{user.cycle_length}}" disabled>

<button id="saveBtn" class="btn btn-primary w-100 rounded-pill" style="display:none;">
 Save Profile
</button>

</form>

<a href="/dashboard" class="custom-btn back-btn">
⬅ Back to Dashboard
</a>

<a href="/logout" class="custom-btn logout-btn">
🚪 Logout
</a>

</div>

<script>

function enableEdit(){

let inputs = document.querySelectorAll(".profile-input");

inputs.forEach(input=>{
input.disabled = false;
});

document.getElementById("saveBtn").style.display = "block";

}

</script>

</body>
</html>
