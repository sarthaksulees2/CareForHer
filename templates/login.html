<!DOCTYPE html>
<html>
<head>
    <title>MHM Hub — Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            background: linear-gradient(135deg,#4A90E2,#6fb1fc);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            backdrop-filter: blur(14px);
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 40px;
            color: white;
            width:380px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.25);
        }

        .card h2{
            font-weight:600;
        }

        .form-control{
            border-radius:12px;
        }

        .btn-primary {
            border-radius: 30px;
            background:#4A90E2;
            border:none;
            font-weight:500;
        }

        .btn-primary:hover{
            background:#357bd8;
        }

        .form-check{
            text-align:left;
            font-size:14px;
        }

        a{
            color:white;
            text-decoration:underline;
        }

        a:hover{
            color:#e6f2ff;
        }

        .fixed-alert-wrapper {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1050;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 320px;
            max-width: calc(100vw - 40px);
        }

        .fixed-alert-wrapper .alert {
            border-radius: 14px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.16);
        }

    </style>
</head>

<body>

<div class="fixed-alert-wrapper">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-success alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
</div>

<div class="card text-center">

    <h2>CARE FOR HER</h2>
    <p>Login to your account</p>

    <form method="POST">

        {% if error %}
            <p style="color:#ff6b6b; font-size:14px;">
                ⚠️ {{ error }}
            </p>
        {% endif %}

        <input
            class="form-control mb-3"
            name="email"
            type="email"
            placeholder="Email"
            required>

        <input
            class="form-control mb-2"
            id="password"
            name="password"
            type="password"
            placeholder="Password"
            required>

        <div class="form-check mb-3">
            <input
                class="form-check-input"
                type="checkbox"
                onclick="togglePassword()"
                id="showPass">

            <label class="form-check-label" for="showPass">
                Show Password
            </label>
        </div>

        <button class="btn btn-primary w-100" type="submit">
            Login
        </button>

    </form>

    <p class="mt-3">
        Don't have an account?
        <a href="/register">Register</a>
    </p>

</div>

<script>

function togglePassword(){

    var x = document.getElementById("password");

    if(x.type === "password"){
        x.type = "text";
    }
    else{
        x.type = "password";
    }
}

setTimeout(function() {

    document.querySelectorAll('.fixed-alert-wrapper .alert')
    .forEach(function(alert) {

        alert.remove();

    });

}, 3500);

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
