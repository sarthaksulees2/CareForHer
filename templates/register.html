<!DOCTYPE html>
<html>
<head>

<title>Create Account</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#4A90E2,#6fb1fc);
font-family:'Segoe UI', sans-serif;
}

.fixed-alert-wrapper {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 1050;
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 320px;
    max-width: calc(100vw - 40px);
}

.fixed-alert-wrapper .alert {
    border-radius: 14px;
    box-shadow: 0 12px 28px rgba(0,0,0,0.16);
}

.card-box{
width:480px;
background:rgba(255,255,255,0.18);
padding:35px;
border-radius:22px;
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.25);
box-shadow:0 10px 35px rgba(0,0,0,0.25);
color:white;
}

h3{
text-align:center;
margin-bottom:20px;
color:white;
}

.form-control{
background:rgba(255,255,255,0.92);
color:#2c3e50;
border-radius:12px;
border:1px solid rgba(0,0,0,0.08);
}

.form-control:focus{
box-shadow:0 0 0 0.15rem rgba(74,144,226,0.25);
}

.btn-primary{
background:#4A90E2;
border:none;
font-weight:500;
}

.btn-primary:hover{
background:#357bd8;
}

a{
color:white;
text-decoration:underline;
}

a:hover{
color:#e6f2ff;
}

</style>

</head>

<body>

<div class="fixed-alert-wrapper">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
</div>

<div class="card-box">

<h3>🌸 Create Your Account</h3>

<form method="POST">

<input class="form-control mb-3" name="name" placeholder="Full Name" required>

<input class="form-control mb-3" name="email" type="email" placeholder="Email" required>

<input class="form-control mb-3" name="phone" type="tel" placeholder="Mobile number" required>

<input class="form-control mb-3" name="password" type="password" placeholder="Password" required>

<div class="row">

<div class="col">
<input class="form-control mb-3" name="age" type="number" placeholder="Age" required>
</div>

<div class="col">
<select class="form-control mb-3" name="gender" required>
<option value="">Gender</option>
<option>Female</option>
<option>Male</option>
<option>Other</option>
</select>
</div>

</div>

<div class="row">

<div class="col">
<input class="form-control mb-3" name="height" type="number" placeholder="Height (cm)" required>
</div>

<div class="col">
<input class="form-control mb-3" name="weight" type="number" placeholder="Weight (kg)" required>
</div>

</div>

<input class="form-control mb-3" name="cycle_length" type="number" placeholder="Average Cycle Length (days)">

<button class="btn btn-primary w-100">
Register
</button>

</form>

<div class="text-center mt-3">

Already have account?

<a href="/login">Login</a>

</div>

</div>

<script>
window.addEventListener('DOMContentLoaded', function() {
    setTimeout(function() {
        document.querySelectorAll('.fixed-alert-wrapper .alert').forEach(function(alert) {
            alert.remove();
        });
    }, 3500);
});
</script>

</body>
</html>
